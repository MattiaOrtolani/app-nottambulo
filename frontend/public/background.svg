<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Base -->
    <linearGradient id="bg" x1="0" y1="0" x2="1920" y2="1080" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#050608"></stop>
      <stop offset="38%" stop-color="#090B10"></stop>
      <stop offset="72%" stop-color="#0A0D12"></stop>
      <stop offset="100%" stop-color="#050608"></stop>
    </linearGradient>

    <!-- Soft fused glows -->
    <radialGradient id="amberGlow1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(360 860) rotate(-18) scale(620 360)">
      <stop offset="0%" stop-color="#D58A1B" stop-opacity="0.28"></stop>
      <stop offset="42%" stop-color="#D58A1B" stop-opacity="0.14"></stop>
      <stop offset="100%" stop-color="#D58A1B" stop-opacity="0"></stop>
    </radialGradient>

    <radialGradient id="amberGlow2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1500 240) rotate(12) scale(520 300)">
      <stop offset="0%" stop-color="#C97E16" stop-opacity="0.18"></stop>
      <stop offset="48%" stop-color="#C97E16" stop-opacity="0.08"></stop>
      <stop offset="100%" stop-color="#C97E16" stop-opacity="0"></stop>
    </radialGradient>

    <radialGradient id="blueGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1300 660) rotate(-20) scale(540 420)">
      <stop offset="0%" stop-color="#365F9E" stop-opacity="0.22"></stop>
      <stop offset="48%" stop-color="#365F9E" stop-opacity="0.10"></stop>
      <stop offset="100%" stop-color="#365F9E" stop-opacity="0"></stop>
    </radialGradient>

    <radialGradient id="milkGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(960 360) scale(720 360)">
      <stop offset="0%" stop-color="#FFF6E9" stop-opacity="0.10"></stop>
      <stop offset="45%" stop-color="#FFF6E9" stop-opacity="0.05"></stop>
      <stop offset="100%" stop-color="#FFF6E9" stop-opacity="0"></stop>
    </radialGradient>

    <!-- Pearlescent ribbons -->
    <linearGradient id="ribbonWarm" x1="260" y1="940" x2="1120" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#EAA126" stop-opacity="0"></stop>
      <stop offset="25%" stop-color="#EAA126" stop-opacity="0.14"></stop>
      <stop offset="60%" stop-color="#F3D6A0" stop-opacity="0.10"></stop>
      <stop offset="100%" stop-color="#EAA126" stop-opacity="0"></stop>
    </linearGradient>

    <linearGradient id="ribbonCool" x1="980" y1="980" x2="1730" y2="240" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5A87C8" stop-opacity="0"></stop>
      <stop offset="42%" stop-color="#5A87C8" stop-opacity="0.12"></stop>
      <stop offset="72%" stop-color="#E7EEF8" stop-opacity="0.08"></stop>
      <stop offset="100%" stop-color="#5A87C8" stop-opacity="0"></stop>
    </linearGradient>

    <linearGradient id="veil" x1="420" y1="120" x2="1670" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.05"></stop>
      <stop offset="40%" stop-color="#F4E4C5" stop-opacity="0.04"></stop>
      <stop offset="72%" stop-color="#7AA0D8" stop-opacity="0.05"></stop>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"></stop>
    </linearGradient>

    <!-- Filters -->
    <filter id="blurXXL" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="95"></feGaussianBlur>
    </filter>

    <filter id="blurXL" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="54"></feGaussianBlur>
    </filter>

    <filter id="blurL" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="26"></feGaussianBlur>
    </filter>

    <filter id="noise" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.78" numOctaves="2" stitchTiles="stitch" result="turb"></feTurbulence>
      <feColorMatrix in="turb" type="saturate" values="0"></feColorMatrix>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.018"></feFuncA>
      </feComponentTransfer>
    </filter>

    <radialGradient id="vignette" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(960 540) scale(1180 760)">
      <stop offset="58%" stop-color="#000000" stop-opacity="0"></stop>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.34"></stop>
    </radialGradient>
  </defs>

  <!-- Base -->
  <rect width="1920" height="1080" fill="url(#bg)"></rect>

  <!-- Soft background fusion -->
  <rect width="1920" height="1080" fill="url(#amberGlow1)"></rect>
  <rect width="1920" height="1080" fill="url(#amberGlow2)"></rect>
  <rect width="1920" height="1080" fill="url(#blueGlow)"></rect>
  <rect width="1920" height="1080" fill="url(#milkGlow)"></rect>

  <!-- Large diffused color masses -->
  <g filter="url(#blurXXL)" opacity="0.95">
    <ellipse cx="320" cy="870" rx="330" ry="180" fill="#B87418" fill-opacity="0.28"></ellipse>
    <ellipse cx="820" cy="740" rx="420" ry="220" fill="#C88A2A" fill-opacity="0.09"></ellipse>
    <ellipse cx="1310" cy="700" rx="360" ry="250" fill="#3F6EAF" fill-opacity="0.18"></ellipse>
    <ellipse cx="1540" cy="250" rx="320" ry="200" fill="#B47219" fill-opacity="0.14"></ellipse>
    <ellipse cx="980" cy="250" rx="460" ry="190" fill="#EFE4D4" fill-opacity="0.07"></ellipse>
  </g>

  <!-- Soft abstract veil -->
  <g filter="url(#blurXL)" opacity="0.85">
    <path d="M170 1040C360 870 530 760 770 728C1015 694 1180 776 1380 692C1560 615 1665 448 1810 240L1980 120V1080H170V1040Z" fill="url(#veil)"></path>
    <path d="M-40 960C170 790 350 700 585 690C845 678 1025 760 1200 720C1400 674 1530 520 1680 320" stroke="url(#ribbonWarm)" stroke-width="26" stroke-linecap="round"></path>
    <path d="M980 1080C1110 950 1220 845 1360 748C1508 646 1650 500 1775 250" stroke="url(#ribbonCool)" stroke-width="24" stroke-linecap="round"></path>
  </g>

  <!-- Pearlescent highlights -->
  <g filter="url(#blurL)" opacity="0.75">
    <path d="M1260 160C1410 120 1575 160 1690 268" stroke="#FFF8EF" stroke-opacity="0.10" stroke-width="12" stroke-linecap="round"></path>
    <path d="M1410 772C1510 824 1608 900 1675 1015" stroke="#FFF8EF" stroke-opacity="0.08" stroke-width="10" stroke-linecap="round"></path>
    <path d="M230 760C285 652 352 565 448 486" stroke="#D1E0FF" stroke-opacity="0.09" stroke-width="10" stroke-linecap="round"></path>
  </g>

  <!-- Low-contrast fog for blending -->
  <g filter="url(#blurXXL)" opacity="0.55">
    <ellipse cx="700" cy="380" rx="500" ry="190" fill="#FFFFFF" fill-opacity="0.03"></ellipse>
    <ellipse cx="1180" cy="540" rx="460" ry="210" fill="#FFF1DD" fill-opacity="0.03"></ellipse>
    <ellipse cx="1600" cy="840" rx="260" ry="120" fill="#DDE7F5" fill-opacity="0.04"></ellipse>
  </g>

  <!-- Fine texture -->
  <rect width="1920" height="1080" filter="url(#noise)"></rect>

  <!-- Gentle vignette -->
  <rect width="1920" height="1080" fill="url(#vignette)"></rect>
</svg>