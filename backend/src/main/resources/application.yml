server:
 port: 8080

spring:
 application:
  name: backend
 datasource:
  url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:appdb}}
  username: ${SPRING_DATASOURCE_USERNAME:postgres}
  password: ${SPRING_DATASOURCE_PASSWORD:postgres}
  driver-class-name: org.postgresql.Driver
 jpa:
  hibernate:
   ddl-auto: update
  open-in-view: false
  properties:
   hibernate:
    format_sql: true
  show-sql: false

management:
 endpoints:
  web:
   exposure:
    include: health,info
 endpoint:
  health:
   probes:
    enabled: true
   show-details: never

app:
 security:
  admin-role: ADMIN
  jwt:
   secret: ${JWT_SECRET:ZGV2LXNlY3JldC1jaGFuZ2UtbWUtZGV2LXNlY3JldC1jaGFuZ2UtbWU=}
   expiration-ms: ${JWT_EXPIRATION_MS:86400000}
