apiVersion: apps/v1
kind: Deployment
metadata:
 name: backend
 namespace: app-nottambulo
 labels:
  app: backend
spec:
 replicas: 1
 selector:
  matchLabels:
   app: backend
 template:
  metadata:
   labels:
    app: backend
  spec:
   containers:
    - name: backend
      image: ghcr.io/mattiaortolani/app-nottambulo-backend:latest
      imagePullPolicy: IfNotPresent
      ports:
       - containerPort: 8080
         name: http
      env:
       - name: DB_HOST
         valueFrom:
          configMapKeyRef:
           name: backend-config
           key: db.host
       - name: DB_PORT
         valueFrom:
          configMapKeyRef:
           name: backend-config
           key: db.port
       - name: DB_NAME
         valueFrom:
          configMapKeyRef:
           name: backend-config
           key: db.name
       - name: SPRING_DATASOURCE_URL
         value: jdbc:postgresql://$(DB_HOST):$(DB_PORT)/$(DB_NAME)
       - name: SPRING_DATASOURCE_USERNAME
         valueFrom:
          secretKeyRef:
           name: backend-db-secret
           key: db.username
       - name: SPRING_DATASOURCE_PASSWORD
         valueFrom:
          secretKeyRef:
           name: backend-db-secret
           key: db.password
       - name: KEYCLOAK_AUTH_URL
         valueFrom:
          configMapKeyRef:
           name: backend-config
           key: keycloak.auth-url
       - name: KEYCLOAK_REALM
         valueFrom:
          configMapKeyRef:
           name: backend-config
           key: keycloak.realm
      readinessProbe:
       httpGet:
        path: /actuator/health
        port: 8080
       initialDelaySeconds: 10
       periodSeconds: 10
      livenessProbe:
       httpGet:
        path: /actuator/health
        port: 8080
       initialDelaySeconds: 30
       periodSeconds: 15
