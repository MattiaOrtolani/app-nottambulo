apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-nottambulo
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/mattiaortolani/app-nottambulo.git
    targetRevision: HEAD
    path: k8s
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: app-nottambulo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true