name: Build And Push Images

on:
 push:
  branches:
   - main
 pull_request:
  branches:
   - main
 workflow_dispatch:

permissions:
 contents: read
 packages: write

jobs:
 build-backend:
  name: build-backend
  runs-on: ubuntu-latest

  steps:
   - name: Checkout repository
     uses: actions/checkout@v4

   - name: Set up Docker Buildx
     uses: docker/setup-buildx-action@v3

   - name: Set up QEMU
     uses: docker/setup-qemu-action@v3

   - name: Log in to GHCR
     if: github.event_name == 'push' && github.ref == 'refs/heads/main'
     uses: docker/login-action@v3
     with:
      registry: ghcr.io
      username: ${{ github.actor }}
      password: ${{ secrets.GITHUB_TOKEN }}

   - name: Extract backend image metadata
     id: meta
     uses: docker/metadata-action@v5
     with:
      images: ghcr.io/${{ github.repository_owner }}/app-nottambulo-backend
      tags: |
       type=raw,value=latest,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
       type=sha,format=short
      labels: |
       org.opencontainers.image.title=app-nottambulo-backend
       org.opencontainers.image.description=Spring Boot backend image for app-nottambulo

   - name: Build backend image
     uses: docker/build-push-action@v6
     with:
      context: ./backend
      file: ./backend/Dockerfile
      platforms: linux/amd64,linux/arm64
      push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
      tags: ${{ steps.meta.outputs.tags }}
      labels: ${{ steps.meta.outputs.labels }}
      cache-from: type=gha
      cache-to: type=gha,mode=max

 build-frontend:
  name: build-frontend
  runs-on: ubuntu-latest

  steps:
   - name: Checkout repository
     uses: actions/checkout@v4

   - name: Set up Docker Buildx
     uses: docker/setup-buildx-action@v3

   - name: Set up QEMU
     uses: docker/setup-qemu-action@v3

   - name: Log in to GHCR
     if: github.event_name == 'push' && github.ref == 'refs/heads/main'
     uses: docker/login-action@v3
     with:
      registry: ghcr.io
      username: ${{ github.actor }}
      password: ${{ secrets.GITHUB_TOKEN }}

   - name: Extract frontend image metadata
     id: meta
     uses: docker/metadata-action@v5
     with:
      images: ghcr.io/${{ github.repository_owner }}/app-nottambulo-frontend
      tags: |
       type=raw,value=latest,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
       type=sha,format=short
      labels: |
       org.opencontainers.image.title=app-nottambulo-frontend
       org.opencontainers.image.description=Angular frontend image for app-nottambulo

   - name: Build frontend image
     uses: docker/build-push-action@v6
     with:
      context: ./frontend
      file: ./frontend/Dockerfile
      platforms: linux/amd64,linux/arm64
      push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
      tags: ${{ steps.meta.outputs.tags }}
      labels: ${{ steps.meta.outputs.labels }}
      cache-from: type=gha
      cache-to: type=gha,mode=max
